<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Thamashi & Pawan</title>
    <!-- Elegant Serif Typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #c3a373;
            --primary-dark: #2c2a29;
            --bg-ivory: #faf8f5;
            --text-muted: #736f6c;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }

        .wedding-card {
            background: #ffffff;
            padding: 48px 32px;
            border-radius: 4px; /* Structured modern edges instead of round bubbles */
            box-shadow: 0 20px 50px rgba(44, 42, 41, 0.03);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(195, 163, 115, 0.15);
            position: relative;
        }

        /* Delicate fine line decorative accent */
        .wedding-card::before {
            content: "";
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(195, 163, 115, 0.2);
            pointer-events: none;
        }

        .monogram {
            font-family: 'Cormorant Garamond', serif;
            font-size: 38px;
            color: var(--primary-gold);
            margin-bottom: 16px;
            font-style: italic;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 400;
            margin: 0 0 12px 0;
            letter-spacing: 1px;
        }

        .sub-wording {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 32px;
            padding: 0 15px;
        }
        
        .drop-zone {
            display: block;
            border: 1px dashed var(--primary-gold);
            background-color: #fdfcfb;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .drop-zone:hover {
            background-color: #f9f5f0;
            border-style: solid;
        }
        
        .upload-icon {
            font-size: 28px;
            color: var(--primary-gold);
            margin-bottom: 12px;
            font-weight: 300;
        }

        #dropZoneText {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary-dark);
            font-weight: 400;
        }
        
        input[type="file"] { display: none; }
        
        .btn {
            background: var(--primary-dark);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--primary-gold);
        }
        .btn:disabled { 
            background: #d1cdcc; 
            cursor: not-allowed; 
        }
        
        #status { 
            margin-top: 20px; 
            font-size: 14px; 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }
        .success { color: #557a55; font-size: 16px; }
        .error { color: #b35c5c; }
    </style>
</head>
<body>

<div class="wedding-card">
    <div class="monogram">T & P</div>
    <h1>Thamashi & Pawan</h1>
    <div class="sub-wording">
        "Every picture tells a part of our story. Thank you for capturing the moments we will cherish forever."
    </div>
    
    <form id="uploadForm">
        <label class="drop-zone" for="photoInput">
            <div class="upload-icon">✨</div>
            <span id="dropZoneText">Select a Photo to Share</span>
            <input type="file" id="photoInput" accept="image/*" required>
        </label>
        <button type="submit" class="btn" id="submitBtn">Upload to Gallery</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzpH7AqT7Cg3xe0_FJw8pOG8morLPioNxExQ1esn-gmjIDnqMhuF2Afv_UUe4Fu8nu1/exec";

    const photoInput = document.getElementById('photoInput');
    const dropZoneText = document.getElementById('dropZoneText');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    photoInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            dropZoneText.innerText = e.target.files[0].name;
        }
    });

    uploadForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const file = photoInput.files[0];
        if (!file) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "Sending Memory...";
        statusDiv.className = '';
        statusDiv.innerText = "Polishing your photograph...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function () {
            const base64Data = reader.result.split(',')[1];
            
            const payload = {
                base64: base64Data,
                mimeType: file.type,
                filename: file.name
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                if(response.status === "success") {
                    statusDiv.className = 'success';
                    statusDiv.innerText = "✨ Your memory has been beautifully saved. Thank you!";
                    uploadForm.reset();
                    dropZoneText.innerText = "Select a Photo to Share";
                } else {
                    throw new Error(response.message);
                }
            })
            .catch(error => {
                statusDiv.className = 'error';
                statusDiv.innerText = "❌ Upload failed. Please try again.";
                console.error(error);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload to Gallery";
            });
        };
    });
</script>

</body>
</html>

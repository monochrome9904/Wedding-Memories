<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Thamashi & Pawan</title>
    <!-- Elegant Serif Typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #c3a373;
            --primary-dark: #2c2a29;
            --bg-ivory: #faf8f5;
            --text-muted: #736f6c;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }

        .wedding-card {
            background: #ffffff;
            padding: 48px 32px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(44, 42, 41, 0.03);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(195, 163, 115, 0.15);
            position: relative;
        }

        .wedding-card::before {
            content: "";
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(195, 163, 115, 0.2);
            pointer-events: none;
        }

        .monogram {
            font-family: 'Cormorant Garamond', serif;
            font-size: 38px;
            color: var(--primary-gold);
            margin-bottom: 16px;
            font-style: italic;
            letter-spacing: 2px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 400;
            margin: 0 0 12px 0;
            letter-spacing: 1px;
        }

        .sub-wording {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 32px;
            padding: 0 15px;
        }
        
        .drop-zone {
            display: block;
            border: 1px dashed var(--primary-gold);
            background-color: #fdfcfb;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .drop-zone:hover {
            background-color: #f9f5f0;
            border-style: solid;
        }
        
        .upload-icon {
            font-size: 28px;
            color: var(--primary-gold);
            margin-bottom: 12px;
            font-weight: 300;
        }

        #dropZoneText {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary-dark);
            font-weight: 400;
            line-height: 1.4;
        }
        
        input[type="file"] { display: none; }
        
        .btn {
            background: var(--primary-dark);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--primary-gold);
        }
        .btn:disabled { 
            background: #d1cdcc; 
            cursor: not-allowed; 
        }
        
        #status { 
            margin-top: 20px; 
            font-size: 14px; 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }
        .success { color: #557a55; font-size: 16px; }
        .error { color: #b35c5c; }
    </style>
</head>
<body>

<div class="wedding-card">
    <div class="monogram">T & P</div>
    <h1>Thamashi & Pawan</h1>
    <div class="sub-wording">
        "Every picture tells a part of our story. Thank you for capturing the moments we will cherish forever."
    </div>
    
    <form id="uploadForm">
        <label class="drop-zone" for="photoInput">
            <div class="upload-icon">✨</div>
            <!-- Added multiple attribute right below -->
            <span id="dropZoneText">Select Photos to Share</span>
            <input type="file" id="photoInput" accept="image/*" multiple required>
        </label>
        <button type="submit" class="btn" id="submitBtn">Upload to Gallery</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzpH7AqT7Cg3xe0_FJw8pOG8morLPioNxExQ1esn-gmjIDnqMhuF2Afv_UUe4Fu8nu1/exec";

    const photoInput = document.getElementById('photoInput');
    const dropZoneText = document.getElementById('dropZoneText');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    photoInput.addEventListener('change', (e) => {
        const count = e.target.files.length;
        if(count > 0) {
            dropZoneText.innerText = count === 1 ? `1 file selected` : `${count} files selected`;
        }
    });

    // Helper function to read file as Base64 wrapped in a promise
    const readFileAsBase64 = (file) => {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = (error) => reject(error);
        });
    };

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const files = photoInput.files;
        if (!files || files.length === 0) return;

        submitBtn.disabled = true;
        statusDiv.className = '';
        
        let successCount = 0;
        let failCount = 0;

        // Loop through all selected files sequentially
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            submitBtn.innerText = `Sending (${i + 1}/${files.length})...`;
            statusDiv.innerText = `Polishing photograph ${i + 1} of ${files.length}...`;

            try {
                const base64Data = await readFileAsBase64(file);
                
                const payload = {
                    base64: base64Data,
                    mimeType: file.type,
                    filename: file.name
                };

                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    successCount++;
                } else {
                    failCount++;
                }
            } catch (error) {
                console.error(error);
                failCount++;
            }
        }

        // Final UI feedback summary after processing all images
        submitBtn.disabled = false;
        submitBtn.innerText = "Upload to Gallery";
        uploadForm.reset();
        dropZoneText.innerText = "Select Photos to Share";

        if (failCount === 0) {
            statusDiv.className = 'success';
            statusDiv.innerText = `✨ All ${successCount} memories have been beautifully saved. Thank you!`;
        } else if (successCount > 0) {
            statusDiv.className = 'success';
            statusDiv.innerText = `✨ Saved ${successCount} memories! (${failCount} failed, please try those again).`;
        } else {
            statusDiv.className = 'error';
            statusDiv.innerText = "❌ Upload failed. Please try again.";
        }
    });
</script>

</body>
</html>

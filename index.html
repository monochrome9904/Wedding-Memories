<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding of Thamashi & Pawan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #c3a373;
            --primary-dark: #2c2a29;
            --bg-ivory: #faf8f5;
            --text-muted: #736f6c;
            --wedding-pink: #9c4153;
            --warm-white: #fff5f5;/* Darker, richer deep rose color for better visibility */
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-ivory);
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px; /* Slightly reduced padding for mobile optimization */
            box-sizing: border-box;
        }

        .wedding-card {
            background-color: var(--warm-white);
            padding: 40px 24px; /* Optimized padding for mobile viewports */
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(44, 42, 41, 0.03);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(195, 163, 115, 0.15);
            position: relative;
            box-sizing: border-box;
        }

        .wedding-card::before {
            content: "";
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(195, 163, 115, 0.2);
            pointer-events: none;
        }

        .illustration-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(195, 163, 115, 0.25);
            box-shadow: 0 4px 15px rgba(44, 42, 41, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        .illustration-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Fixed text sizing and forced layout containment for mobile displays */
        h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 38px; /* Balanced down from 46px to comfortably fit mobile screens */
            font-weight: 400;
            color: var(--wedding-pink);
            margin: 0 0 16px 0;
            white-space: nowrap; /* Guarantees the names remain strictly on a single line */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub-wording {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 32px;
            padding: 0 8px;
        }
        
        .drop-zone {
            display: block;
            border: 1px dashed var(--primary-gold);
            background-color: #fdfcfb;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .drop-zone:hover {
            background-color: #f9f5f0;
            border-style: solid;
        }
        
        .upload-icon {
            font-size: 28px;
            color: var(--primary-gold);
            margin-bottom: 12px;
            font-weight: 300;
        }

        #dropZoneText {
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--primary-dark);
            font-weight: 400;
            line-height: 1.4;
        }
        
        input[type="file"] { display: none; }
        
        .btn {
            background: var(--primary-dark);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 24px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: var(--primary-gold);
        }
        .btn:disabled { 
            background: #d1cdcc; 
            cursor: not-allowed; 
        }

        .upload-note {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
        
        #status { 
            margin-top: 20px; 
            font-size: 14px; 
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }
        .success { color: #557a55; font-size: 16px; }
    </style>
</head>
<body>

<div class="wedding-card">
    <div class="illustration-container">
        <img src="51657.jpeg" alt="Thamashi & Pawan Wedding Illustration">
    </div>

    <h1>Thamashi & Pawan</h1>
    
    <div class="sub-wording">
        "Every picture tells a part of our story. Thank you for capturing the moments we will cherish forever."
    </div>
    
    <form id="uploadForm">
        <label class="drop-zone" for="photoInput">
            <div class="upload-icon">✨</div>
            <span id="dropZoneText">Select Photos to Share</span>
            <input type="file" id="photoInput" accept="image/*" multiple required>
        </label>
        <button type="submit" class="btn" id="submitBtn">Upload to Gallery</button>
        <div class="upload-note">(To ensure a smooth upload, please select 20 photos or less at one time)</div>
    </form>
    
    <div id="status"></div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzpH7AqT7Cg3xe0_FJw8pOG8morLPioNxExQ1esn-gmjIDnqMhuF2Afv_UUe4Fu8nu1/exec";

    const photoInput = document.getElementById('photoInput');
    const dropZoneText = document.getElementById('dropZoneText');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    photoInput.addEventListener('change', (e) => {
        const count = e.target.files.length;
        if(count > 0) {
            dropZoneText.innerText = count === 1 ? `1 file selected` : `${count} files selected`;
        }
    });

    const resizeAndCompressFile = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1280; 
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height = Math.round((height * MAX_WIDTH) / width);
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.70);
                    resolve(dataUrl.split(',')[1]);
                };
            };
        });
    };

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const files = photoInput.files;
        if (!files || files.length === 0) return;

        submitBtn.disabled = true;
        statusDiv.className = '';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            submitBtn.innerText = `Sending (${i + 1}/${files.length})...`;
            statusDiv.innerText = `Optimizing photograph ${i + 1} of ${files.length}...`;

            try {
                const base64Data = await resizeAndCompressFile(file);
                
                const payload = {
                    base64: base64Data,
                    mimeType: "image/jpeg",
                    filename: file.name.replace(/\.[^/.]+$/, "") + ".jpg"
                };

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 20000);

                try {
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                } catch (fetchError) {
                    console.log(`Photo ${i + 1} timed out or failed. Skipped silently.`);
                } finally {
                    clearTimeout(timeoutId);
                }
                
            } catch (error) {
                console.error(error);
            }
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "Upload to Gallery";
        uploadForm.reset();
        dropZoneText.innerText = "Select Photos to Share";

        statusDiv.className = 'success';
        statusDiv.innerText = `✨ Your memories have been beautifully saved. Thank you!`;
    });
</script>

</body>
</html>

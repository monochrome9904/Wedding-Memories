<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Memories</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --bg: #f9f9fb;
            --text: #2d3436;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .upload-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
        p { color: #747d8c; font-size: 14px; margin-bottom: 30px; }
        
        .drop-zone {
            border: 2px dashed #dfe4ea;
            padding: 30px 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .drop-zone:hover { border-color: var(--primary); background: #f8f7ff; }
        
        input[type="file"] { display: none; }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status { margin-top: 15px; font-size: 14px; font-weight: 500; }
        .success { color: #2ed573; }
        .error { color: #ff4757; }
    </style>
</head>
<body>

<div class="upload-card">
    <h1>Capture the Moment</h1>
    <p>Upload your favorite photos to share them with us forever.</p>
    
    <form id="uploadForm">
        <label class="drop-zone" for="photoInput">
            <div style="font-size: 40px; margin-bottom: 10px;">📸</div>
            <span id="dropZoneText">Tap to select or drop photos</span>
            <input type="file" id="photoInput" accept="image/*" required>
        </label>
        <button type="submit" class="btn" id="submitBtn">Upload Memory</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzpH7AqT7Cg3xe0_FJw8pOG8morLPioNxExQ1esn-gmjIDnqMhuF2Afv_UUe4Fu8nu1/exec";

    const photoInput = document.getElementById('photoInput');
    const dropZoneText = document.getElementById('dropZoneText');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    photoInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            dropZoneText.innerText = e.target.files[0].name;
        }
    });

    uploadForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const file = photoInput.files[0];
        if (!file) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "Uploading...";
        statusDiv.className = '';
        statusDiv.innerText = "Sending to the vault...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function () {
            const base64Data = reader.result.split(',')[1];
            
            const payload = {
                base64: base64Data,
                mimeType: file.type,
                filename: file.name
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                if(response.status === "success") {
                    statusDiv.className = 'success';
                    statusDiv.innerText = "✨ Uploaded successfully! Thank you!";
                    uploadForm.reset();
                    dropZoneText.innerText = "Tap to select or drop photos";
                } else {
                    throw new Error(response.message);
                }
            })
            .catch(error => {
                statusDiv.className = 'error';
                statusDiv.innerText = "❌ Upload failed. Please try again.";
                console.error(error);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "Upload Memory";
            });
        };
    });
</script>

</body>
</html>
